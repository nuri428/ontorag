services:
  fuseki:
    build:
      context: .
      dockerfile: docker/fuseki/Dockerfile
    environment:
      FUSEKI_DATASET: ${FUSEKI_DATASET:-ontorag}
      ADMIN_PASSWORD: ${FUSEKI_PASSWORD:-admin}
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GRAPH_STORE: fuseki
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET:-ontology}
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: ${FUSEKI_PASSWORD:-admin}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      fuseki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

