services:
  fuseki:
    build:
      context: .
      dockerfile: docker/fuseki/Dockerfile
    environment:
      FUSEKI_DATASET: ${FUSEKI_DATASET:-ontorag}
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  # Neo4j + neosemantics (n10s) backend. Opt-in only:
  #   docker compose --profile neo4j up neo4j
  # apoc + n10s are auto-installed by the image (version-matched to 5.26).
  neo4j:
    image: neo4j:5.26-community
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ontorag123}
      NEO4J_PLUGINS: '["apoc","n10s","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "n10s.*,apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "n10s.*,apoc.*,gds.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-ontorag123} 'RETURN 1' || exit 1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GRAPH_STORE: ${GRAPH_STORE:-fuseki}
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET:-ontorag}
      FUSEKI_USER: admin
      FUSEKI_PASSWORD: ${FUSEKI_PASSWORD:-admin}
      # Neo4j backend — used when GRAPH_STORE=neo4j (start the neo4j profile too).
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ontorag123}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./chat.db:/app/chat.db
    depends_on:
      fuseki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
