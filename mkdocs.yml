site_name: ontorag
site_url: https://nuri428.github.io/ontorag/
site_description: OWL-native, ontology-aware RAG framework — ontology as the source of truth.
site_author: Jaeho Kang
repo_url: https://github.com/nuri428/ontorag
repo_name: nuri428/ontorag
copyright: MIT &copy; Jaeho Kang

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: material/hexagon-outline

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true

plugins:
  - search:
      lang:
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          site_name: ontorag (한국어)
          nav_translations:
            Home: 홈
            Getting started: 시작하기
            Installation: 설치
            Quickstart: 빠른 시작
            Guides: 가이드
            Web UI: Web UI
            Ontology Learning: 온톨로지 학습
            Reasoning: 추론 레이어
            Reference: 레퍼런스
            CLI: CLI
            MCP & Tools: MCP & 툴
            Architecture: 아키텍처
            Resources: 리소스
            Benchmark: 벤치마크
            Changelog: 변경 이력
            Design notes: 설계 노트
            Portfolio: 포트폴리오
            Neo4j backend evolution: Neo4j 백엔드 변천

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
  - Guides:
      - Web UI: webui.md
      - Ontology Learning: learning.md
      - Reasoning: reasoning.md
  - Reference:
      - CLI: cli.md
      - MCP & Tools: mcp.md
      - Architecture: architecture.md
  - Resources:
      - Benchmark: benchmark.md
      - Changelog: changelog.md
      - Design notes:
          - Named Graph layers: design/named-graph-layers.md
          - Bayesian layer: design/bayesian-layer.md
          - Causal layer: design/causal-layer.md
          - Multi-ontology scoping: design/multi-ontology.md
          - Directory loader: design/directory-loader.md
          - SPARQL approach: design/sparql-approach.md
          - Fuseki parity: design/fuseki-parity.md
          - Neo4j (n10s): design/neo4j-n10s.md
          - Neo4j BM25 search: design/neo4j-bm25.md
          - Neo4j embeddings: design/neo4j-embedding.md
          - FalkorDB: design/falkordb.md
          - Layered ontology plan: design/layered-ontology-plan.md
      - Portfolio:
          - Neo4j backend evolution: portfolio/neo4j-evolution.md

# The raw BENCHMARK file lives in docs/ for the snippets include used by
# benchmark.md — kept off the nav so it isn't a duplicate entry point.
not_in_nav: |
  /BENCHMARK_v1.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nuri428/ontorag
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ontorag/
      name: PyPI (placeholder)
  generator: false
