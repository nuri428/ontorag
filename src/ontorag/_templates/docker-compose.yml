# ontorag — Fuseki only (pip install users)
# Run: docker compose up -d
# Then: ontorag serve   (starts the API locally)
#
# Uses a custom multi-arch Fuseki image (amd64 + arm64 native).
# No Rosetta emulation needed on Apple Silicon.
services:
  fuseki:
    build:
      context: .
      dockerfile: docker/fuseki/Dockerfile
    environment:
      FUSEKI_DATASET: ${FUSEKI_DATASET:-ontorag}
      ADMIN_PASSWORD: ${FUSEKI_PASSWORD:-admin}
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

