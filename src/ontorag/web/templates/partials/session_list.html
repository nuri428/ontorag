{% if sessions %}
{% for s in sessions %}
<div class="session-item group relative flex items-center gap-2 px-3 py-2 mb-1 rounded-lg
            cursor-pointer hover:bg-gray-800 transition-colors w-full"
     id="sess-{{ s.id }}"
     data-session-id="{{ s.id }}"
     onclick="loadSession('{{ s.id }}')">
    <div class="flex-1 min-w-0">
        <div class="text-xs text-gray-300 truncate font-medium leading-snug">{{ s.title }}</div>
        <div class="text-xs text-gray-600 mt-0.5">{{ s.updated[:16].replace('T', ' ') }}</div>
    </div>
    <button class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400
                   text-xs shrink-0 transition-opacity leading-none"
            onclick="event.stopPropagation(); deleteSession('{{ s.id }}')"
            title="삭제">✕</button>
</div>
{% endfor %}
{% else %}
<div class="text-xs text-gray-700 text-center py-6 select-none">대화 없음</div>
{% endif %}
